name: Find Avocent IP from Router ARP

on:
  workflow_dispatch:
    inputs:
      router_host:
        description: "Router management IP/DNS"
        required: true
      router_os:
        description: "Router OS (cisco_ios | cisco_nxos | arista_eos | juniper_junos)"
        required: true
        default: "cisco_ios"
      arp_filter:
        description: "Filter string for ARP (e.g. 'Vlan20' or '192.168.20.')"
        required: false
        default: "Vlan20"

jobs:
  find-ip:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install netmiko

      - name: Find Avocent candidates from ARP
        env:
          ROUTER_HOST: ${{ inputs.router_host }}
          ROUTER_OS: ${{ inputs.router_os }}
          ARP_FILTER: ${{ inputs.arp_filter }}
          ROUTER_USER: ${{ secrets.ROUTER_USER }}
          ROUTER_PASS: ${{ secrets.ROUTER_PASS }}
          ROUTER_ENABLE: ${{ secrets.ROUTER_ENABLE }}  # optional; for Cisco enable mode
        run: |
          python scripts/find_avocent_ip.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: arp-results
          path: out/arp_results.json
